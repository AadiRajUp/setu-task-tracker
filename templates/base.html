<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block styles %}{% endblock %}
    <title>{% block title %}Setu task tracker{% endblock %}</title>
</head>
<body>
    <nav class="navbar">
        <div class="brand" onclick="window.location.href='/setu/'">Setu Task Tracker</div>
        <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="primary-navigation">
            <a href="/setu/form">Add Task</a>
            <a href="/setu/addnotice">Add Notice</a>
            <a href="/setu/notices">Notices</a>
           <!-- <a href="/tables" {{"" if session.get('userrole')=="Admin" else "hidden"}}>Tables</a>
           --> 
           
            <a href="/setu/completed">Completed</a>
            <a href="/setu/logout">Logout</a>            
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
        const navToggle = document.querySelector('.nav-toggle');
        const navLinks = document.querySelector('.nav-links');

        if (navToggle && navLinks) {
            navToggle.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                navToggle.setAttribute('aria-expanded', String(isOpen));
            });

            navLinks.querySelectorAll('a').forEach((link) => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('open');
                    navToggle.setAttribute('aria-expanded', 'false');
                });
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
